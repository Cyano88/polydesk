services:
  - type: web
    name: polydesk
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    disk:
      name: polydesk-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "3000"
      - key: DATA_PATH
        value: /var/data
      - key: VITE_AUTH_BRIDGE
        value: hybrid
      - key: VITE_PRIVY_APP_ID
        sync: false
      - key: PRIVY_APP_ID
        sync: false
      - key: PRIVY_APP_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: VITE_PUBLIC_PAYLINK_ORIGIN
        value: https://hashpaylink.com
      - key: HASH_PAYLINK_BASE_URL
        value: https://hashpaylink.com
      - key: HASH_PAYLINK_POLYDESK_SERVICE_TOKEN
        sync: false
      - key: POLYMARKET_ALERT_FROM_EMAIL
        sync: false
      - key: POLYMARKET_ALERT_FROM_NAME
        value: PolyDesk
      - key: RESEND_API_KEY
        sync: false

      - key: POLYMARKET_CHAIN_ID
        value: "137"
      - key: POLYMARKET_RELAYER_URL
        sync: false
      - key: POLYMARKET_RPC_URL
        sync: false
      - key: PRIVATE_RPC_URL
        sync: false
      - key: PRIVATE_RPC_URL_BASE_SEPOLIA
        sync: false
      - key: PRIVATE_RPC_URL_ARB
        sync: false
      - key: PRIVATE_RPC_URL_ARC
        sync: false
      - key: SOLANA_RPC_URL
        sync: false
      - key: POLYMARKET_BUILDER_CODE
        sync: false
      - key: POLYMARKET_BUILDER_API_KEY
        sync: false
      - key: POLYMARKET_BUILDER_SECRET
        sync: false
      - key: POLYMARKET_BUILDER_PASSPHRASE
        sync: false
      - key: POLYMARKET_ORDER_SIGNING_ENABLED
        sync: false

      - key: POLY_STREAM_FIXTURE_MODE
        value: auto
      - key: POLY_STREAM_LIMIT
        value: "64"
      - key: POLY_STREAM_LEAGUE_ID
        value: "732"
      - key: POLY_STREAM_SEASON
        value: "2026"
      - key: POLY_STREAM_BASE_URL
        sync: false
      - key: POLY_STREAM_API_KEY
        sync: false
      - key: POLYMARKET_MARKET_LOOKUP
        value: "1"
      - key: POLYMARKET_LOOKUP_LIMIT
        value: "20"
      - key: POLYMARKET_WORLD_CUP_LIMIT
        value: "100"
      - key: POLYMARKET_MATCH_URLS
        sync: false

      - key: ZEROSCOUT_API_URL
        value: https://zeroscout.app
      - key: ZEROSCOUT_INTEGRATION_SECRET
        sync: false

      - key: DEFAULT_AGENT_SLUG
        value: polydesk-agent
      - key: DEFAULT_AGENT_WALLET_CHAIN
        value: ARC-TESTNET
      - key: DEFAULT_AGENT_CHAIN
        value: ARC-TESTNET
      - key: DEFAULT_AGENT_WALLET_ADDRESS
        sync: false
      - key: AGENT_WALLET_SERVICE_SECRET
        sync: false
      - key: AGENT_ACTIVITY_STORE_KEY
        value: polydesk:agent-activity
      - key: AGENT_WALLET_ALLOWED_SERVICE_URLS
        sync: false
      - key: AGENT_WALLET_MAX_SERVICE_AMOUNT
        value: "0.01"
      - key: AGENT_WALLET_MAX_GATEWAY_DEPOSIT_AMOUNT
        value: "5"
      - key: AGENT_WALLET_GATEWAY_BALANCE_CHAIN
        value: ARC-TESTNET
      - key: AGENT_WALLET_GATEWAY_DEPOSIT_VERIFY_ATTEMPTS
        value: "6"
      - key: AGENT_WALLET_GATEWAY_DEPOSIT_VERIFY_DELAY_MS
        value: "5000"
      - key: AGENT_PROFILE_STORE
        sync: false
      - key: AGENT_PROFILE_STORE_KEY
        sync: false
      - key: PRIVY_CIRCLE_LINK_STORE
        sync: false
      - key: CIRCLE_CLI_ENABLED
        value: "true"
      - key: CIRCLE_API_KEY
        sync: false
      - key: CIRCLE_TEST_API_KEY
        sync: false

      - key: X402_SELLER_ADDRESS
        sync: false
      - key: X402_POLYMARKET_SCOUT_PRICE
        value: "$0.01"
      - key: X402_FACILITATOR_URL
        sync: false
      - key: X402_ACCEPT_NETWORKS
        sync: false
      - key: X402_POLYMARKET_SCOUT_URL
        sync: false

      - key: OKX_X402_FACILITATOR_PRIVATE_KEY
        sync: false
      - key: OKX_X402_PAY_TO
        sync: false
      - key: OKX_XLAYER_RPC_URL
        sync: false
      - key: OKX_X402_POLYMARKET_LP_SCOUT_PRICE
        value: "0.01"

      - key: CIRCLE_GATEWAY_API_BASE
        sync: false
      - key: CIRCLE_X402_RECEIPT_API_KEY
        sync: false
